<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌤 WeatherSphere</h1>
<div class="greeting">
    <h3>Good Afternoon ☀️</h3>
    <p>Search any city to check the latest weather.</p>
</div>
        <div class="search-box">
            <input
                type="text"
                id="city"
                placeholder="Search for a city...">

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div class="weather-card">

            <div class="weather-icon">
                ☀️
            </div>

            <h2 id="cityName">
                Islamabad
            </h2>

            <h3 id="temperature">
                28°C
            </h3>

            <p id="description">
                Sunny
            </p>

        </div>

        <div class="details">

            <div class="detail-card">
                💧
                <h4>Humidity</h4>
                <p>56%</p>
            </div>

            <div class="detail-card">
                💨
                <h4>Wind</h4>
                <p>12 km/h</p>
            </div>

            <div class="detail-card">
                🌡
                <h4>Pressure</h4>
                <p>1012 hPa</p>
            </div>

            <div class="detail-card">
                👁
                <h4>Visibility</h4>
                <p>10 km</p>
            </div>

        </div>
<div class="forecast">

    <h2>5-Day Forecast</h2>

    <div class="forecast-container">

        <div class="forecast-card">
            <p>Mon</p>
            <div>☀️</div>
            <span>30°C</span>
        </div>

        <div class="forecast-card">
            <p>Tue</p>
            <div>🌤️</div>
            <span>29°C</span>
        </div>

        <div class="forecast-card">
            <p>Wed</p>
            <div>☁️</div>
            <span>27°C</span>
        </div>

        <div class="forecast-card">
            <p>Thu</p>
            <div>🌧️</div>
            <span>24°C</span>
        </div>

        <div class="forecast-card">
            <p>Fri</p>
            <div>⛈️</div>
            <span>23°C</span>
        </div>

    </div>

</div>
    </div>

    <script src="script.js"></script>

</body>

</html>
